apply_scene:
  name: Apply scene
  description: Apply a fixed palette scene to target lights.
  fields:
    scene:
      name: Scene
      description: Scene key to apply.
      required: true
      selector:
        select:
          options:
            - golden_lounge
            - coastal_breeze
            - studio_focus
            - sunset_ribbon
            - emerald_garden
            - mauve_twilight
    target:
      name: Target
      description: Light targets.
      required: true
      selector:
        target:
          entity:
            domain: light
    transition:
      name: Transition
      description: Transition duration in seconds.
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: s
    brightness:
      name: Brightness
      description: Optional brightness override.
      selector:
        number:
          min: 1
          max: 255
          step: 1

start_dynamic_scene:
  name: Start dynamic scene
  description: Start dynamic palette rotation on target lights.
  fields:
    scene:
      name: Scene
      description: Scene key to run dynamically.
      required: true
      selector:
        select:
          options:
            - aurora_flow
            - prism_drift
            - candle_wave
            - neon_rain
    target:
      name: Target
      description: Light targets.
      required: true
      selector:
        target:
          entity:
            domain: light
    interval:
      name: Interval
      description: Delay between frames.
      selector:
        number:
          min: 1
          max: 120
          step: 1
          unit_of_measurement: s
    transition:
      name: Transition
      description: Transition duration in seconds.
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: s
    brightness:
      name: Brightness
      description: Optional brightness override.
      selector:
        number:
          min: 1
          max: 255
          step: 1

stop_dynamic_scene:
  name: Stop dynamic scene
  description: Stop one running dynamic scene by id.
  fields:
    id:
      name: Scene id
      description: Id returned by start_dynamic_scene.
      required: true
      selector:
        text:

stop_all_dynamic_scenes:
  name: Stop all dynamic scenes
  description: Stop all running dynamic scenes.

list_scenes:
  name: List scenes
  description: Return available scene keys and metadata.
