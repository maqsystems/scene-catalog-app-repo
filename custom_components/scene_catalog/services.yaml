apply_scene:
  name: Apply Lighting Scene
  description: Apply a fixed lighting scene palette to target lights.
  fields:
    scene:
      name: Lighting scene
      description: Scene key to apply.
      required: true
      selector:
        select:
          options:
            - golden_lounge
            - coastal_breeze
            - studio_focus
            - sunset_ribbon
            - emerald_garden
            - mauve_twilight
            - arctic_bloom
            - volcanic_ember
            - forest_mist
    target:
      name: Target
      description: Light targets.
      required: true
      selector:
        target:
          entity:
            domain: light
    transition:
      name: Transition
      description: Transition duration in seconds.
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: s
    brightness:
      name: Brightness
      description: Optional brightness override.
      selector:
        number:
          min: 1
          max: 255
          step: 1

start_dynamic_scene:
  name: Start Dynamic Lighting Scene
  description: Start a dynamic lighting scene palette on target lights.
  fields:
    scene:
      name: Dynamic lighting scene
      description: Scene key to run dynamically.
      required: true
      selector:
        select:
          mode: dropdown
          multiple: false
          options:
            - aurora_flow
            - prism_drift
            - candle_wave
            - neon_rain
            - moon_tide
            - solar_flare
            - deep_ocean_pulse
    target:
      name: Target
      description: Light targets.
      required: true
      selector:
        target:
          entity:
            domain: light
    interval:
      name: Interval
      description: Delay between frames.
      selector:
        number:
          min: 1
          max: 120
          step: 1
          unit_of_measurement: s
    transition:
      name: Transition
      description: Transition duration in seconds.
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: s
    brightness:
      name: Brightness
      description: Optional brightness override.
      selector:
        number:
          min: 1
          max: 255
          step: 1

stop_dynamic_scene:
  name: Stop Dynamic Lighting Scene
  description: Stop one running dynamic lighting scene by id.
  fields:
    id:
      name: Scene id
      description: Id returned by start_dynamic_scene.
      required: true
      selector:
        text:

stop_all_dynamic_scenes:
  name: Stop All Dynamic Lighting Scenes
  description: Stop all running dynamic lighting scenes.

list_scenes:
  name: List Lighting Scenes
  description: Return available lighting scene keys and metadata.
