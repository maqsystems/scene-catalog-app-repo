name: Lighting Scene Studio App
slug: scene_catalog_v2
version: "0.4.0"
description: Build and apply custom lighting scenes from a curated palette catalog
url: "https://github.com/maqsystems/scene-catalog-app-repo/tree/main/scene_catalog"
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:palette
panel_title: Lighting Scene Studio
homeassistant_api: true
hassio_api: false
apparmor: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
init: false
map:
  - type: homeassistant_config
    read_only: false
    path: /config
  - type: share
    read_only: false
options:
  default_targets: "light.living_room"
schema:
  default_targets: "str?"
