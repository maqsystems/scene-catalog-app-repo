name: Scene Catalog App
slug: scene_catalog_v2
version: "0.2.1"
description: Apply simple curated light scenes from a small catalog
url: "https://github.com/maqsystems/scene-catalog-app-repo/tree/main/scene_catalog"
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:palette
panel_title: Scene Catalog
homeassistant_api: true
hassio_api: false
apparmor: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
init: false
map:
  - share:rw
options:
  default_targets: "light.living_room"
schema:
  default_targets: "str?"
